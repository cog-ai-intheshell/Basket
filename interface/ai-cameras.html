<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Basketball World Model Playground - AI Input</title>
    <link rel="stylesheet" href="styles.css">
    <link id="lightTheme" rel="stylesheet" href="light-mode.css" disabled>
    <link id="darkTheme" rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="ai-cameras.css">
  </head>
  <body data-theme="dark">
    <main class="ai-dataset-frame" aria-label="Multi-view visual model input">
      <section class="ai-camera-grid" aria-label="Synchronized camera feeds">
        <article class="camera-card">
          <canvas data-camera="profile" aria-label="profile_camera"></canvas>
        </article>
        <article class="camera-card">
          <canvas data-camera="top" aria-label="top_camera"></canvas>
        </article>
        <article class="camera-card">
          <canvas data-camera="rear" aria-label="rear_camera"></canvas>
        </article>
        <article class="camera-card">
          <canvas data-camera="hoop" aria-label="hoop_camera"></canvas>
        </article>
        <article class="camera-card">
          <canvas data-camera="left" aria-label="left_camera"></canvas>
        </article>
        <article class="camera-card">
          <canvas data-camera="oblique" aria-label="oblique_camera"></canvas>
        </article>
      </section>
    </main>

    <script src="ai-cameras.js"></script>
  </body>
</html>
